spring.application.name=web
server.port=${HTTP_PLATFORM_PORT:8085}

# URL de tu base de datos (creada en PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ONG_UnidosCorazones}

spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Configuracion de JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.cloud.discovery.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# --- SOLUCION A ERRORES DE CONEXION ---
# Aumentamos el limite de tamaño de archivos (Default es 1 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
